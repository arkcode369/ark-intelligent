run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-files:
    - "^main\\.go$"  # legacy monolith file, kept for reference only
  exclude-rules:
    - path: "^main\\.go$"
      linters:
        - errcheck
        - unused
        - deadcode
